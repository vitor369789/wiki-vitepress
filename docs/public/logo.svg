<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fundo -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  
  <!-- Ícone de livro/documentação -->
  <g fill="white">
    <!-- Livro -->
    <rect x="30" y="25" width="40" height="50" rx="2" fill="white" opacity="0.9"/>
    <rect x="30" y="25" width="5" height="50" fill="white"/>
    
    <!-- Linhas do texto -->
    <line x1="40" y1="35" x2="65" y2="35" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="45" x2="65" y2="45" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="55" x2="60" y2="55" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="65" x2="65" y2="65" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
